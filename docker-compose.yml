volumes:
  n8n_data:


services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n_scraper
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Africa/Cairo
    volumes:
      - n8n_data:/home/node/.n8n

  python_scraper:
    build: ./scraper
    container_name: python_scraper_api
    restart: always
    ports:
      - "5000:5000"
